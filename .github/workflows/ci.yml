name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx anyio
      - name: Run Pytest
        run: |
          cd backend
          python -m pytest

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          # Crucial: Use legacy-peer-deps to handle the Angular 21/Analog conflict
          npm install --legacy-peer-deps

      - name: Run Vitest
        run: |
          cd frontend
          # Run in CI mode (non-watch, exit on failure)
          npm run test -- --run