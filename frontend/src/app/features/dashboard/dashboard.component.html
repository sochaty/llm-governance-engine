<div class="dashboard-container">
  <header>
    <h1>LLM Governance Engine</h1>
    <p>Benchmark Frontier vs. Local Models in Real-Time</p>
  </header>

  <section class="input-area">
    <textarea [(ngModel)]="userPrompt" placeholder="Enter a complex prompt to test ROI..."></textarea>
    <button (click)="runBenchmark()" [disabled]="llmService.isStreaming()">
      {{ llmService.isStreaming() ? 'Analyzing...' : 'Run Benchmark' }}
    </button>
  </section>

  <div class="comparison-grid">
    <div class="card frontier">
      <h3>Frontier (GPT-5 Cloud)</h3>
      <div class="metrics">Latency: {{ cloudTime() }}ms</div>
      <div class="content">{{ cloudResponse() }}</div>
    </div>

    <div class="card local">
      <h3>Local (Llama 4 / DeepSeek)</h3>
      <div class="metrics">Latency: {{ localTime() }}ms | Cost: $0.00</div>
      <div class="content">{{ localResponse() }}</div>
    </div>
  </div>
</div>
